# Cross-platform Tauri release matrix.
#
# Triggers on a tag push matching v*.*.* — e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Builds for macOS + Windows only — Linux is the userbase we don't have
# yet, and dropping it cuts CI time + AppImage size from the release.
#
# Today every artifact ships UNSIGNED. To enable signing, add the
# corresponding secrets to the repo — the workflow auto-detects them
# via a job-level env var and switches branch.
#
# Optional repo secrets (signing kicks in when present):
#   # Tauri auto-updater (signs latest.json so the in-app updater trusts it):
#   TAURI_SIGNING_PRIVATE_KEY            - content of `tauri signer generate -w <key>`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   - passphrase you set on it
#
#   # macOS Developer ID code-signing + notarization:
#   APPLE_CERTIFICATE                    - base64 of your .p12
#   APPLE_CERTIFICATE_PASSWORD           - the .p12 password
#   APPLE_SIGNING_IDENTITY               - "Developer ID Application: <name> (<TEAMID>)"
#   APPLE_ID                             - your Apple ID email
#   APPLE_PASSWORD                       - app-specific password (not your Apple ID password)
#   APPLE_TEAM_ID                        - 10-char team id from developer.apple.com/account
#
#   # Windows code-signing:
#   WINDOWS_CERTIFICATE                  - base64 of your .pfx
#   WINDOWS_CERTIFICATE_PASSWORD         - the .pfx password

name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # tauri-action creates the release + uploads assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary. We emit both .app (re-tarred + signed by
          # tauri-action into the .app.tar.gz the updater consumes — only
          # produced when the TAURI_SIGNING_PRIVATE_KEY is set) and .dmg
          # (what users actually download for fresh installs).
          - platform: macos-latest
            args: "--target universal-apple-darwin --bundles app,dmg"
            label: macos-universal
          # Windows → NSIS (.exe installer) + WiX (.msi). Both come out of
          # the same cargo build; --bundles picks which artifacts get
          # emitted. The updater consumes the .nsis.zip variant.
          - platform: windows-latest
            args: "--bundles nsis,msi"
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    # Surface the secret-presence as a job-level env var. `if:` on steps
    # can't read `secrets.*` directly but can read `env.*`. This is the
    # standard workaround for "skip this step iff this secret is unset."
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.label }}

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Two variants of the build step gated on HAS_APPLE_CERT. tauri-action's
      # `security import` runs whenever APPLE_CERTIFICATE is defined in the
      # env — including as the empty string — so we have to fully omit those
      # vars when no cert exists. GitHub Actions doesn't support conditional
      # `env:` keys per-step, so two steps + `if:` is the cleanest workaround.
      # Both branches share everything else; only the Apple env block differs.

      - name: Build & publish bundles (with macOS signing)
        if: env.HAS_APPLE_CERT == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Vite reads import.meta.env.VITE_API_BASE_URL at build time;
          # tauri-action runs `pnpm --filter @justnotetaking/web build`
          # as a subprocess so the env propagates. Source is the repo
          # variable so swapping the API host doesn't need a code change.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "JustNoteTaking ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            - **macOS (universal)** — `JustNoteTaking_*_universal.dmg`
            - **Windows** — `JustNoteTaking_*_x64-setup.exe` or `.msi`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build & publish bundles (no macOS signing)
        if: env.HAS_APPLE_CERT != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # See the signed branch above for why this is here.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Updater signing is independent of code signing — always set.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows can sign independently of Apple — only attach when set.
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "JustNoteTaking ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            - **macOS (universal)** — `JustNoteTaking_*_universal.dmg`
            - **Windows** — `JustNoteTaking_*_x64-setup.exe` or `.msi`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload bundles as workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.label }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
